app = "cat-capture"
primary_region = "iad"

[build]

[env]
  PORT = "3001"
  NODE_ENV = "production"
  DATA_DIR = "/data"

[[mounts]]
  source = "cat_capture_data"
  destination = "/data"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
