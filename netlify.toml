[build]
  command = "corepack enable && pnpm install --frozen-lockfile && pnpm --filter web run build"
  publish = "web/dist"

[[redirects]]
  from = "/api/*"
  to = "https://cat-capture.fly.dev/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "https://cat-capture.fly.dev/uploads/:splat"
  status = 200
  force = true
